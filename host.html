<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aspire Wonder Wednesday — Host Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --card: #1a1a26;
    --accent: #00e5ff;
    --accent2: #ff3cac;
    --gold: #ffd700;
    --text: #f0f0ff;
    --muted: #6b6b8a;
    --border: rgba(255,255,255,0.08);
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .view {
    min-height: 100vh;
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .nav {
    position: fixed;
    top: 1rem;
    right: 1rem;
    z-index: 100;
    display: flex;
    gap: 8px;
  }

  .nav-btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
  }

  .nav-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .count-badge {
    display: inline-block;
    background: var(--accent);
    color: #000;
    font-size: 10px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 10px;
    margin-left: 4px;
  }

  .host-header {
    width: 100%;
    max-width: 700px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
  }

  .host-title {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    color: var(--accent);
  }

  .live-badge {
    background: rgba(255,60,172,0.15);
    border: 1px solid var(--accent2);
    color: var(--accent2);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 4px 10px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .live-dot {
    width: 6px;
    height: 6px;
    background: var(--accent2);
    border-radius: 50%;
    animation: pulse 1s infinite;
  }

  @keyframes pulse {
    0%,100% { opacity:1; }
    50% { opacity:0.3; }
  }

  .leaderboard {
    width: 100%;
    max-width: 700px;
  }

  .lb-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 8px;
    transition: all 0.3s;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { transform: translateX(-20px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  .lb-row.first { border-color: var(--gold); background: rgba(255,215,0,0.05); }
  .lb-row.second { border-color: #c0c0c0; background: rgba(192,192,192,0.05); }
  .lb-row.third { border-color: #cd7f32; background: rgba(205,127,50,0.05); }

  .lb-rank {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 800;
    min-width: 36px;
    text-align: center;
  }

  .lb-name {
    flex: 1;
    font-size: 16px;
    font-weight: 500;
  }

  .lb-time {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    color: var(--accent);
  }

  .lb-time.fast {
    color: var(--gold);
  }

  .empty-state {
    text-align: center;
    color: var(--muted);
    padding: 3rem;
    font-size: 15px;
  }

  .host-controls {
    display: flex;
    gap: 10px;
    margin-top: 1rem;
    width: 100%;
    max-width: 700px;
  }

  .btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #0099cc);
    color: #000;
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    filter: brightness(1.1);
  }

  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 13px;
    margin-top: 0.75rem;
  }

  .btn-ghost:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
</style>
</head>
<body>

<div class="nav">
  <a class="nav-btn" href="index.html">🎮 Game</a>
  <div class="nav-btn">🔒 Host <span class="count-badge" id="nav-count">0</span></div>
</div>

<div class="view">
  <div class="host-header">
    <div class="host-title">🔒 Host Leaderboard</div>
    <div class="live-badge"><div class="live-dot"></div> LIVE</div>
  </div>

  <div class="leaderboard" id="leaderboard-list">
    <div class="empty-state">Waiting for players to submit... 👀</div>
  </div>

 <div class="host-controls">
  <button class="btn btn-ghost" onclick="clearScores()" style="flex:1;">
    Clear All Scores
  </button>
  <button class="btn btn-primary" onclick="refreshLeaderboard()" style="flex:2;">
    Refresh 🔄
  </button>
</div>
</div>

<script>
  let lastTopScoreTs = null;
  const API_BASE = 'https://aspire-zip-game-backend.onrender.com/api';

  async function getScores() {
    try {
      const res = await fetch(`${API_BASE}/scores`);
      if (!res.ok) throw new Error('Failed to fetch scores');
      const data = await res.json();
      return data.scores || [];
    } catch (err) {
      console.error('getScores error:', err);
      return [];
    }
  }

  async function clearScores() {
  const confirmClear = confirm('Are you sure you want to clear all scores?');
  if (!confirmClear) return;

  try {
    const res = await fetch(`${API_BASE}/scores`, {
      method: 'DELETE'
    });

    if (!res.ok) throw new Error('Failed to clear scores');

    // Refresh leaderboard after clearing
    refreshLeaderboard();
  } catch (err) {
    console.error('clearScores error:', err);
    alert('Failed to clear scores');
  }
}
  async function refreshLeaderboard() {
  const scores = await getScores();
  const list = document.getElementById('leaderboard-list');
  document.getElementById('nav-count').textContent = scores.length;

  if (scores.length === 0) {
    list.innerHTML = '<div class="empty-state">Waiting for players to submit... 👀</div>';
    return;
  }

  const medals = ['🥇', '🥈', '🥉'];
  const rankClasses = ['first', 'second', 'third'];

  const newTop = scores[0];
  const isNewTop = newTop && newTop.ts !== lastTopScoreTs;

  list.innerHTML = scores.map((s, i) => {
    const isNew = i === 0 && isNewTop;

    return `
      <div class="lb-row ${rankClasses[i] || ''} ${isNew ? 'new-entry' : ''}">
        <div class="lb-rank">${medals[i] || (i + 1)}</div>
        <div class="lb-name">${escapeHtml(s.name)}</div>
        <div class="lb-time ${i === 0 ? 'fast' : ''}">${Number(s.time).toFixed(2)}s</div>
      </div>
    `;
  }).join('');

  // Save last top score
  if (newTop) {
    lastTopScoreTs = newTop.ts;
  }

  // Auto scroll to top if new score
  if (isNewTop) {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  setInterval(refreshLeaderboard, 3000);
  refreshLeaderboard();
</script>

</body>
</html>
